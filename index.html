<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: black;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.item a {
  text-decoration: none;
  color: black;
}

.delete {
  color: red;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <h1>Wishlist</h1>

  <div class="card">
    <input id="name" placeholder="What do you want?">
    <input id="link" placeholder="Optional link (Amazon, etc)">
    <button onclick="addItem()">Add to Wishlist</button>
  </div>

  <div class="card" id="list"></div>

</div>

<script>
let items = JSON.parse(localStorage.getItem("wishlist")) || [];

function save() {
  localStorage.setItem("wishlist", JSON.stringify(items));
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  items.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div>
        ${item.link 
          ? `<a href="${item.link}" target="_blank">${item.name}</a>` 
          : item.name}
      </div>
      <span class="delete" onclick="removeItem(${index})">✕</span>
    `;

    list.appendChild(div);
  });
}

function addItem() {
  const name = document.getElementById("name").value;
  const link = document.getElementById("link").value;

  if (!name) return;

  items.push({ name, link });
  save();
  render();

  document.getElementById("name").value = "";
  document.getElementById("link").value = "";
}

function removeItem(index) {
  items.splice(index, 1);
  save();
  render();
}

render();
</script>

</body>
</html>
