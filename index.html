<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Wishlist</h1>

<div class="container">

  <!-- HER SIDE -->
  <div class="column">
    <h2>Her</h2>

    <input id="her-name" placeholder="Item name or link">
    <input id="her-price" type="number" placeholder="Price (£)">
    <button onclick="addItem('her')">Add</button>

    <div id="her-list"></div>

    <div class="total">Total: £<span id="her-total">0</span></div>
  </div>

  <!-- HIS SIDE -->
  <div class="column">
    <h2>Him</h2>

    <input id="him-name" placeholder="Item name or link">
    <input id="him-price" type="number" placeholder="Price (£)">
    <button onclick="addItem('him')">Add</button>

    <div id="him-list"></div>

    <div class="total">Total: £<span id="him-total">0</span></div>
  </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("wishlist")) || {
  her: [],
  him: []
};

function save() {
  localStorage.setItem("wishlist", JSON.stringify(data));
}

function render() {
  ["her", "him"].forEach(side => {
    const list = document.getElementById(side + "-list");
    const totalEl = document.getElementById(side + "-total");

    list.innerHTML = "";
    let total = 0;

    data[side].forEach((item, index) => {
      total += Number(item.price);

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div>
          ${item.link ? `<a href="${item.link}" target="_blank">${item.name}</a>` : item.name}
          <span class="price">£${item.price}</span>
        </div>
        <span class="delete" onclick="removeItem('${side}', ${index})">✕</span>
      `;

      list.appendChild(div);
    });

    totalEl.textContent = total.toFixed(2);
  });
}

function addItem(side) {
  const nameInput = document.getElementById(side + "-name");
  const priceInput = document.getElementById(side + "-price");

  const name = nameInput.value;
  const price = priceInput.value;

  if (!name || !price) return;

  const link = name.startsWith("http") ? name : "";

  data[side].push({
    name: name,
    price: price,
    link: link
  });

  save();
  render();

  nameInput.value = "";
  priceInput.value = "";
}

function removeItem(side, index) {
  data[side].splice(index, 1);
  save();
  render();
}

render();
</script>

</body>
</html>
