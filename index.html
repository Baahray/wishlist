<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Wishlist</title>

<link rel="stylesheet" href="styles.css?v=6">
</head>

<body>

<h1>Our Wishlist</h1>

<div class="container">

  <!-- Vetannie -->
  <div class="column">

    <h2>Vetannie</h2>

    <select id="her-currency" onchange="render()">
      <option value="GBP">£ GBP</option>
      <option value="USD">$ USD</option>
    </select>

    <div class="form">
      <input id="her-name" placeholder="Item or link">
      <input id="her-price" type="number" placeholder="Price">

      <select id="her-rating">
        <option value="1">★</option>
        <option value="2">★★</option>
        <option value="3">★★★</option>
      </select>

      <button onclick="addItem('her')">Add item</button>
    </div>

    <div class="list" id="her-list"></div>

    <div class="total">
      <span id="her-total">£0.00</span>
      <div class="sub" id="her-sub"></div>
    </div>

  </div>

  <!-- Barry -->
  <div class="column">

    <h2>Barry</h2>

    <select id="him-currency" onchange="render()">
      <option value="GBP">£ GBP</option>
      <option value="USD">$ USD</option>
    </select>

    <div class="form">
      <input id="him-name" placeholder="Item or link">
      <input id="him-price" type="number" placeholder="Price">

      <select id="him-rating">
        <option value="1">★</option>
        <option value="2">★★</option>
        <option value="3">★★★</option>
      </select>

      <button onclick="addItem('him')">Add item</button>
    </div>

    <div class="list" id="him-list"></div>

    <div class="total">
      <span id="him-total">£0.00</span>
      <div class="sub" id="him-sub"></div>
    </div>

  </div>

</div>

<script>
let data = { her: [], him: [] };
const rate = 1.27;

// Load
function load() {
  try {
    const saved = JSON.parse(localStorage.getItem("wishlist"));
    if (saved && saved.her && saved.him) {
      data = saved;
    }
  } catch {}
}

// Save
function save() {
  localStorage.setItem("wishlist", JSON.stringify(data));
}

// Format
function format(amount, currency) {
  return currency === "GBP"
    ? `£${amount.toFixed(2)}`
    : `$${amount.toFixed(2)}`;
}

// Convert
function convert(amount, currency) {
  return currency === "GBP"
    ? `$${(amount * rate).toFixed(2)}`
    : `£${(amount / rate).toFixed(2)}`;
}

// Render
function render() {
  ["her", "him"].forEach(side => {

    const currency = document.getElementById(side + "-currency").value;
    const list = document.getElementById(side + "-list");
    const totalEl = document.getElementById(side + "-total");
    const subEl = document.getElementById(side + "-sub");

    list.innerHTML = "";
    let total = 0;

    data[side].forEach((item, index) => {
      total += Number(item.price);

      const stars = "★".repeat(item.rating || 1);

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div>
          ${item.link ? `<a href="${item.link}" target="_blank">${item.name}</a>` : item.name}
          <span class="price">${format(item.price, currency)}</span>
          <span class="stars">${stars}</span>
        </div>
        <span class="delete" onclick="removeItem('${side}', ${index})">×</span>
      `;

      list.appendChild(div);
    });

    totalEl.textContent = format(total, currency);
    subEl.textContent = convert(total, currency);
  });
}

// Add item (FIXED animation)
function addItem(side) {
  const name = document.getElementById(side + "-name").value.trim();
  const price = parseFloat(document.getElementById(side + "-price").value);
  const rating = parseInt(document.getElementById(side + "-rating").value);

  if (!name || isNaN(price)) return;

  data[side].push({
    name,
    price,
    rating,
    link: name.startsWith("http") ? name : ""
  });

  save();
  render();

  // ✨ Animate AFTER render
  setTimeout(() => {
    const items = document.querySelectorAll(`#${side}-list .item`);
    const lastItem = items[items.length - 1];
    if (lastItem) {
      lastItem.classList.add("add-anim");
    }
  }, 10);

  document.getElementById(side + "-name").value = "";
  document.getElementById(side + "-price").value = "";
}

// Remove item (FIXED animation)
function removeItem(side, index) {
  const items = document.querySelectorAll(`#${side}-list .item`);
  const itemEl = items[index];

  if (!itemEl) return;

  itemEl.classList.add("remove-anim");

  setTimeout(() => {
    data[side].splice(index, 1);
    save();
    render();
  }, 300);
}

// Init
load();
render();
</script>

</body>
</html>
