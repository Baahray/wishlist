<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Our Wishlist</title>

<link rel="stylesheet" href="styles.css?v=20">
</head>

<body>

<h1>Our Wishlist</h1>

<div class="container">

  <div class="column">
    <h2>Vetannie</h2>

    <select id="her-currency" onchange="render()">
      <option value="GBP">£ GBP</option>
      <option value="USD">$ USD</option>
    </select>

    <div class="form">
      <input id="her-name" placeholder="Item or link">
      <input id="her-price" type="number" placeholder="Price">

      <select id="her-rating">
        <option value="1">★</option>
        <option value="2">★★</option>
        <option value="3">★★★</option>
      </select>

      <button onclick="addItem('her', event)">Add item</button>
    </div>

    <div class="list" id="her-list"></div>

    <div class="total">
      <span id="her-total">£0.00</span>
      <div class="sub" id="her-sub"></div>
    </div>
  </div>

  <div class="column">
    <h2>Barry</h2>

    <select id="him-currency" onchange="render()">
      <option value="GBP">£ GBP</option>
      <option value="USD">$ USD</option>
    </select>

    <div class="form">
      <input id="him-name" placeholder="Item or link">
      <input id="him-price" type="number" placeholder="Price">

      <select id="him-rating">
        <option value="1">★</option>
        <option value="2">★★</option>
        <option value="3">★★★</option>
      </select>

      <button onclick="addItem('him', event)">Add item</button>
    </div>

    <div class="list" id="him-list"></div>

    <div class="total">
      <span id="him-total">£0.00</span>
      <div class="sub" id="him-sub"></div>
    </div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYP42L9-Ghb0O2yTC82pSRPKBwPtR5ehE",
  authDomain: "wishlist-6c440.firebaseapp.com",
  projectId: "wishlist-6c440",
  storageBucket: "wishlist-6c440.firebasestorage.app",
  messagingSenderId: "1034747393035",
  appId: "1:1034747393035:web:24166b3cc58d0a5950030e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const wishlistRef = doc(db, "wishlist", "shared");

let data = { her: [], him: [] };
const rate = 1.27;

/* ---------- FORMAT ---------- */

function format(amount, currency) {
  return currency === "GBP"
    ? "£" + amount.toFixed(2)
    : "$" + amount.toFixed(2);
}

function convert(amount, currency) {
  return currency === "GBP"
    ? "$" + (amount * rate).toFixed(2)
    : "£" + (amount / rate).toFixed(2);
}

/* ---------- RENDER ---------- */

function render() {

  ["her", "him"].forEach(side => {

    const currency = document.getElementById(side + "-currency").value;
    const list = document.getElementById(side + "-list");
    const totalEl = document.getElementById(side + "-total");
    const subEl = document.getElementById(side + "-sub");

    list.innerHTML = "";
    let total = 0;

    data[side].forEach((item, i) => {

      total += Number(item.price);

      const isLink = item.name.startsWith("http");
      let displayName = item.name;

      if (isLink) {
        try {
          const url = new URL(item.name);
          displayName = url.hostname.replace("www.", "");
        } catch {}
      }

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div class="item-text">
          ${
            isLink
              ? `<a href="${item.name}" target="_blank">${displayName}</a>`
              : displayName
          }
          <span class="price">${format(item.price, currency)}</span>
          <span class="stars">${"★".repeat(item.rating)}</span>
        </div>
        <span class="delete" onclick="removeItem('${side}', ${i})">×</span>
      `;

      list.appendChild(div);

    });

    totalEl.textContent = format(total, currency);
    subEl.textContent = convert(total, currency);

  });
}

/* ---------- SAVE ---------- */

async function save() {
  await setDoc(wishlistRef, data);
}

/* ---------- ADD ---------- */

window.addItem = async function(side, e) {

  const name = document.getElementById(side + "-name").value.trim();
  const price = parseFloat(document.getElementById(side + "-price").value) || 0;
  const rating = parseInt(document.getElementById(side + "-rating").value);

  if (!name) return;

  sparkleBurst(e);

  data[side].push({ name, price, rating });

  await save();

  document.getElementById(side + "-name").value = "";
  document.getElementById(side + "-price").value = "";
};

/* ---------- REMOVE ---------- */

window.removeItem = async function(side, i) {
  data[side].splice(i, 1);
  await save();
};

/* ---------- REALTIME ---------- */

onSnapshot(wishlistRef, (docSnap) => {

  if (docSnap.exists()) {
    data = docSnap.data();
    render();
  } else {
    save();
  }

});

</script>

<script>

/* ---------- SPARKLE SYSTEM ---------- */

function sparkleBurst(e) {

  const rect = e.target.getBoundingClientRect();
  const x = rect.left + rect.width / 2;
  const y = rect.top + rect.height / 2;

  for (let i = 0; i < 8; i++) {

    const s = document.createElement("div");
    s.className = "sparkle";

    const angle = Math.random() * Math.PI * 2;
    const distance = 40 + Math.random() * 40;

    const offsetX = Math.cos(angle) * distance + "px";
    const offsetY = Math.sin(angle) * distance + "px";

    s.style.left = x + "px";
    s.style.top = y + "px";

    s.style.setProperty("--x", offsetX);
    s.style.setProperty("--y", offsetY);

    document.body.appendChild(s);

    setTimeout(() => s.remove(), 1200);

  }

}

</script>
<script>

function sparkleReveal(element){

  const rect = element.getBoundingClientRect();

  for(let i=0;i<14;i++){

    const s = document.createElement("div");
    s.className = "sparkle";

    const x = rect.left + rect.width/2;
    const y = rect.top + rect.height/2;

    const angle = Math.random() * Math.PI * 2;
    const distance = 30 + Math.random()*40;

    s.style.left = x + "px";
    s.style.top = y + "px";

    s.style.setProperty("--x", Math.cos(angle)*distance+"px");
    s.style.setProperty("--y", Math.sin(angle)*distance+"px");

    document.body.appendChild(s);

    setTimeout(()=>s.remove(),1200);

  }

}

</script>
</body>
</html>
