<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shared Wishlist</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    input {
      padding: 10px;
      width: 70%;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    ul {
      margin-top: 20px;
      padding: 0;
      list-style: none;
    }

    li {
      background: #f2f2f2;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;

      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 0.3s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <h2>Shared Wishlist</h2>

  <input id="itemInput" placeholder="Add item..." />
  <button onclick="addItem()">Add</button>

  <ul id="list"></ul>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDYP42L9-Ghb0O2yTC82pSRPKBwPtR5ehE",
      authDomain: "wishlist-6c440.firebaseapp.com",
      projectId: "wishlist-6c440",
      storageBucket: "wishlist-6c440.firebasestorage.app",
      messagingSenderId: "1034747393035",
      appId: "1:1034747393035:web:24166b3cc58d0a5950030e",
      measurementId: "G-CKGY9M9N49"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Add item
    window.addItem = async function () {
      const input = document.getElementById("itemInput");
      if (!input.value) return;

      await addDoc(collection(db, "wishlist_items"), {
        name: input.value,
        createdAt: Date.now()
      });

      input.value = "";
    };

    // Real-time updates
    onSnapshot(collection(db, "wishlist_items"), (snapshot) => {
      const list = document.getElementById("list");
      list.innerHTML = "";

      snapshot.forEach(doc => {
        const item = doc.data();

        const li = document.createElement("li");
        li.textContent = item.name;

        list.appendChild(li);
      });
    });
  </script>

</body>
</html>
