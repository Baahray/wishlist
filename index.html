<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Our Wishlist</title>
<link rel="stylesheet" href="styles.css?v=18">
</head>

<body>

<h1>Our Wishlist</h1>

<div class="container">

  <div class="column">
    <h2>Vetannie</h2>

    <select id="her-currency" onchange="render()">
      <option value="GBP">£ GBP</option>
      <option value="USD">$ USD</option>
    </select>

    <div class="form">
      <input id="her-name" placeholder="Item or link">
      <input id="her-price" type="number" placeholder="Price">

      <select id="her-rating">
        <option value="1">★</option>
        <option value="2">★★</option>
        <option value="3">★★★</option>
      </select>

      <button onclick="addItem('her')">Add item</button>
    </div>

    <div class="list" id="her-list"></div>

    <div class="total">
      <span id="her-total">£0.00</span>
      <div class="sub" id="her-sub"></div>
    </div>
  </div>

  <div class="column">
    <h2>Barry</h2>

    <select id="him-currency" onchange="render()">
      <option value="GBP">£ GBP</option>
      <option value="USD">$ USD</option>
    </select>

    <div class="form">
      <input id="him-name" placeholder="Item or link">
      <input id="him-price" type="number" placeholder="Price">

      <select id="him-rating">
        <option value="1">★</option>
        <option value="2">★★</option>
        <option value="3">★★★</option>
      </select>

      <button onclick="addItem('him')">Add item</button>
    </div>

    <div class="list" id="him-list"></div>

    <div class="total">
      <span id="him-total">£0.00</span>
      <div class="sub" id="him-sub"></div>
    </div>
  </div>

</div>

<script>
let data = { her: [], him: [] };
const rate = 1.27;

function load() {
  try {
    const saved = JSON.parse(localStorage.getItem("wishlist"));
    if (saved && saved.her && saved.him) data = saved;
  } catch {}
}

function save() {
  localStorage.setItem("wishlist", JSON.stringify(data));
}

function format(amount, currency) {
  return currency === "GBP" ? `£${amount.toFixed(2)}` : `$${amount.toFixed(2)}`;
}

function convert(amount, currency) {
  return currency === "GBP"
    ? `$${(amount * rate).toFixed(2)}`
    : `£${(amount / rate).toFixed(2)}`;
}

function createSparkles(el) {
  const r = el.getBoundingClientRect();

  for (let i = 0; i < 20; i++) {
    const s = document.createElement("div");
    s.className = "sparkle";

    const a = Math.random() * Math.PI * 2;
    const d = Math.random() * 40 + 10;

    s.style.setProperty("--x", Math.cos(a) * d + "px");
    s.style.setProperty("--y", Math.sin(a) * d + "px");

    s.style.left = r.left + r.width / 2 + "px";
    s.style.top = r.top + r.height / 2 + "px";

    const size = Math.random() * 6 + 6;
    s.style.width = size + "px";
    s.style.height = size + "px";

    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1200);
  }
}

function createSmoke(el) {
  const r = el.getBoundingClientRect();

  for (let i = 0; i < 16; i++) {
    const s = document.createElement("div");
    s.className = "smoke";

    s.style.left = r.left + r.width / 2 + (Math.random() - 0.5) * 80 + "px";
    s.style.top = r.top + r.height / 2 + (Math.random() - 0.5) * 80 + "px";

    document.body.appendChild(s);
    setTimeout(() => s.remove(), 700);
  }
}

function render() {
  ["her", "him"].forEach(side => {
    const currency = document.getElementById(side + "-currency")?.value || "GBP";
    const list = document.getElementById(side + "-list");
    const totalEl = document.getElementById(side + "-total");
    const subEl = document.getElementById(side + "-sub");

    list.innerHTML = "";
    let total = 0;

    data[side].forEach((item, i) => {
      total += item.price;

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div class="item-text">
          ${item.name}
          <span class="price">${format(item.price, currency)}</span>
          <span class="stars">${"★".repeat(item.rating)}</span>
        </div>
        <span class="delete" onclick="removeItem('${side}', ${i})">×</span>
      `;

      list.appendChild(div);
    });

    totalEl.textContent = format(total, currency);
    subEl.textContent = convert(total, currency);
  });
}

function addItem(side) {
  const name = document.getElementById(side + "-name").value.trim();
  const price = parseFloat(document.getElementById(side + "-price").value);
  const rating = parseInt(document.getElementById(side + "-rating").value);

  if (!name || isNaN(price)) return;

  data[side].push({ name, price, rating });
  save();
  render();

  setTimeout(() => {
    const items = document.querySelectorAll(`#${side}-list .item`);
    const item = items[items.length - 1];
    const textEl = item.querySelector(".item-text");

    if (textEl) createSparkles(textEl);
  }, 80);

  document.getElementById(side + "-name").value = "";
  document.getElementById(side + "-price").value = "";
}

function removeItem(side, i) {
  const items = document.querySelectorAll(`#${side}-list .item`);
  const el = items[i];

  if (!el) return;

  createSmoke(el);

  el.style.opacity = "0";
  el.style.transform = "scale(0.85)";
  el.style.transition = "0.25s";

  setTimeout(() => {
    data[side].splice(i, 1);
    save();
    render();
  }, 250);
}

window.onload = () => {
  load();
  render();
};
</script>

</body>
</html>
