<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Wishlist</h1>

<div class="container">

  <!-- HER -->
  <div class="column">
    <h2>Her</h2>

    <input id="her-name" placeholder="Item name or link">
    <input id="her-price" type="number" placeholder="Price (£)">
    <button onclick="addItem('her')">Add</button>

    <div id="her-list"></div>

    <div class="total">Total: £<span id="her-total">0.00</span></div>
  </div>

  <!-- HIM -->
  <div class="column">
    <h2>Him</h2>

    <input id="him-name" placeholder="Item name or link">
    <input id="him-price" type="number" placeholder="Price (£)">
    <button onclick="addItem('him')">Add</button>

    <div id="him-list"></div>

    <div class="total">Total: £<span id="him-total">0.00</span></div>
  </div>

</div>

<script>
let data = { her: [], him: [] };

// Load safely
function load() {
  try {
    const saved = JSON.parse(localStorage.getItem("wishlist"));
    if (saved && saved.her && saved.him) {
      data = saved;
    }
  } catch (e) {
    data = { her: [], him: [] };
  }
}

// Save
function save() {
  localStorage.setItem("wishlist", JSON.stringify(data));
}

// Render UI
function render() {
  ["her", "him"].forEach(side => {
    const list = document.getElementById(side + "-list");
    const totalEl = document.getElementById(side + "-total");

    list.innerHTML = "";
    let total = 0;

    data[side].forEach((item, index) => {
      total += Number(item.price);

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div>
          ${item.link 
            ? `<a href="${item.link}" target="_blank">${item.name}</a>` 
            : item.name}
          <span class="price">£${Number(item.price).toFixed(2)}</span>
        </div>
        <span class="delete" onclick="removeItem('${side}', ${index})">✕</span>
      `;

      list.appendChild(div);
    });

    totalEl.textContent = total.toFixed(2);
  });
}

// Add item
function addItem(side) {
  const nameInput = document.getElementById(side + "-name");
  const priceInput = document.getElementById(side + "-price");

  const name = nameInput.value.trim();
  const price = parseFloat(priceInput.value);

  if (!name || isNaN(price)) return;

  const link = name.startsWith("http") ? name : "";

  data[side].push({
    name: name,
    price: price,
    link: link
  });

  save();
  render();

  nameInput.value = "";
  priceInput.value = "";
}

// Remove item
function removeItem(side, index) {
  data[side].splice(index, 1);
  save();
  render();
}

// Init
load();
render();
</script>

</body>
</html>
